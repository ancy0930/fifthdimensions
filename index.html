<body>

    <h1>Fifth Dimensions Logo Exporter</h1>

    <!-- This canvas holds the image in memory -->
    <canvas id="logoCanvas" width="512" height="512"></canvas>

    <button id="downloadBtn">Download Logo PNG</button>

    <script>
        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('downloadBtn');

        // Colors from your design
        const COLOR_GOLD = '#D4AF37';
        const COLOR_BG = null; // Transparent background

        // Draw the logo
        function drawLogo() {
            const size = 512;
            const padding = 60; // Padding inside the canvas
            const boxSize = size - (padding * 2);

            // Clear canvas
            ctx.clearRect(0, 0, size, size);

            // 1. Draw Outer Border Box
            ctx.strokeStyle = COLOR_GOLD;
            ctx.lineWidth = 10;
            ctx.globalAlpha = 0.4; // Matches CSS opacity
            ctx.strokeRect(padding, padding, boxSize, boxSize);

            // 2. Draw Inner Rotated Square (Diamond)
            ctx.save(); // Save context state

            // Move to center
            ctx.translate(size / 2, size / 2);

            // Rotate 45 degrees
            ctx.rotate(45 * Math.PI / 180);

            // Draw filled square (centered at new origin)
            // The original CSS was 8px inside 38px. 
            // Scaling up: Inner is roughly 1/5th of outer.
            const innerSize = boxSize / 5;

            ctx.fillStyle = COLOR_GOLD;
            ctx.globalAlpha = 1.0;
            ctx.fillRect(-innerSize / 2, -innerSize / 2, innerSize, innerSize);

            ctx.restore(); // Restore context state
        }

        // Download Function
        btn.addEventListener('click', () => {
            // Convert canvas to data URL (PNG)
            const image = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");

            // Create temporary link
            const link = document.createElement('a');
            link.download = 'fifth-dimensions-logo.png';
            link.href = image;
            link.click();
        });

        // Run on load
        drawLogo();
    </script>
